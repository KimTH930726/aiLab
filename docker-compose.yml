services:
  agent:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # LanceDB 데이터 영속화
      - lancedb_data:/tmp/lancedb_self_correction_agent
    environment:
      - AGENT_MODEL=${AGENT_MODEL:-ollama:exaone3.5:7.8b}
      # Ollama pydantic-ai 프로바이더
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      # Ollama OpenAI 호환 API (Pydantic AI는 키가 필요하나 로컬은 dummy 허용)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy-key-for-local}
      - OPENAI_BASE_URL=http://host.docker.internal:11434/v1
    extra_hosts:
      # Linux에서 host.docker.internal 사용을 위해 필요 (Mac은 자동)
      - "host.docker.internal:host-gateway"

volumes:
  lancedb_data:
